services:
  db:
    image: postgis/postgis:16-3.4
    container_name: twambo_db
    environment:
      POSTGRES_DB: twambo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: twambo1234
    ports:
      - "5432:5432"
    volumes:
      - twambo_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: twambo_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: .
    container_name: twambo_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    build: .
    container_name: twambo_celery
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  twambo_db_data:
